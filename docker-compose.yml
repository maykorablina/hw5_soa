services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-setup:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - "kafka-topics"
      - "--create"
      - "--if-not-exists"
      - "--bootstrap-server"
      - "kafka:9092"
      - "--topic"
      - "movie-events"
      - "--partitions"
      - "3"
      - "--replication-factor"
      - "1"

  clickhouse-setup:
    image: clickhouse/clickhouse-server:24.3
    depends_on:
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        clickhouse-client --host clickhouse --port 9000 --multiline --query "
          CREATE TABLE IF NOT EXISTS movie_events_queue (
              event_id  String,
              user_id   String,
              movie_id  String,
              event_type String,
              timestamp String,
              device_type String,
              session_id String,
              progress_seconds Nullable(Int32)
          ) ENGINE = Kafka
          SETTINGS
              kafka_broker_list = 'kafka:9092',
              kafka_topic_list  = 'movie-events',
              kafka_group_name  = 'clickhouse-consumer',
              kafka_format      = 'JSONEachRow',
              kafka_num_consumers = 1;
          CREATE MATERIALIZED VIEW IF NOT EXISTS movie_events_mv TO movie_events AS
          SELECT
              event_id,
              user_id,
              movie_id,
              event_type,
              parseDateTimeBestEffort(timestamp) AS timestamp,
              device_type,
              session_id,
              progress_seconds
          FROM movie_events_queue;
        "

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  movie-service:
    build: ./movie_service
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
      kafka-setup:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: cinema
      POSTGRES_DB: cinema
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema -d cinema"]
      interval: 10s
      timeout: 5s
      retries: 10

  aggregation-service:
    build: ./aggregation_service
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      DATABASE_URL: postgresql://cinema:cinema@postgres:5432/cinema
      AGGREGATION_INTERVAL_SECONDS: "300"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  tests:
    build: ./tests
    depends_on:
      movie-service:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      MOVIE_SERVICE_URL: http://movie-service:8000
      CLICKHOUSE_HOST: clickhouse
    profiles:
      - test
